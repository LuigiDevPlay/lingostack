<!doctype html>
<html lang="es">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoStack - Menú</title>
    <link rel="stylesheet" href="src/css/styles.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('LingoStack PWA Activa', reg))
            .catch(err => console.log('Error al registrar PWA', err));
        });
      }
    </script>
  </head>

        LINGO<span class="text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">STACK</span>
      </h1>

      <div class="flex flex-col items-center justify-center gap-2 mt-2 md:mt-4">
        <p
          class="text-yellow-500 text-[10px] md:text-xs font-black tracking-[0.3em] uppercase opacity-80"
        >
          Mejor Puntuación

        <div

            <svg
              xmlns="http://www.w3.org/2000/svg"

          >

      </div>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-sm px-4 md:px-0">

        INICIAR PARTIDA

      <button

      >
        <span>🏆</span> MEJORES PUNTAJES
      </button>

      <div class="w-full mt-2">
        <label
          class="text-[10px] text-sky-500 font-black uppercase tracking-[0.2em] ml-2 mb-1 block"
        >
          MODO DE JUEGO
        </label>
        <div class="relative">
          <select
            id="select-difficulty"
            class="w-full bg-slate-900 text-white py-4 px-4 rounded-2xl font-bold border-2 border-slate-800 appearance-none focus:border-sky-500 outline-none cursor-pointer transition-colors text-sm"
          >
            <option value="basico">BÁSICO (Vidas ∞)</option>
            <option value="normal" selected>NORMAL (5 Vidas)</option>
            <option value="dificil">DIFÍCIL (Pausa Penaliza)</option>
            <option value="experto">EXPERTO (3 Vidas)</option>
          </select>
          <div
            class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-sky-500"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="3"
                d="M19 9l-7 7-7-7"
              ></path>
            </svg>
          </div>
        </div>
      </div>

      <div class="flex justify-center mb-2">
        <button
          id="btn-volume"
          class="flex items-center gap-2 bg-slate-800/50 hover:bg-slate-700 text-sky-500 py-2 px-6 rounded-full border border-slate-700 transition-all active:scale-95 cursor-pointer"
        >
          <span id="vol-icon">🔊</span>
          <span class="text-[10px] font-black uppercase tracking-widest text-white"
            >Música: <span id="vol-status" class="text-sky-400">ON</span></span
          >
        </button>
      </div>
    </div>

    <div id="ranking-modal" class="hidden fixed inset-0 z-200 flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-md"></div>

      <div
        class="relative bg-slate-900 border-2 border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl"
      >
        <div class="text-center mb-6">
          <span class="text-4xl">🏆</span>
          <h3 class="text-2xl font-black text-white uppercase tracking-tighter mt-2">
            Salón de la Fama
          </h3>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">
            Tus mejores marcas
          </p>
        </div>

        <div
          id="ranking-list"
          class="space-y-3 mb-6 max-h-60 overflow-y-auto pr-2 custom-scrollbar"
        ></div>

        <button
          id="close-ranking"
          class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-2xl transition-all border-2 border-slate-700 cursor-pointer"
        >
          VOLVER
        </button>
      </div>
    </div>

    <audio id="snd-hover" src="src/assets/sounds/hover.mp3" preload="auto"></audio>
    <audio id="snd-click" src="src/assets/sounds/click.mp3" preload="auto"></audio>
    <audio id="snd-start" src="src/assets/sounds/start.mp3" preload="auto"></audio>
    <audio id="bgm-menu" src="src/assets/sounds/bgm_menu.mp3" loop preload="auto"></audio>

    <script>
      // --- REFERENCIAS DE AUDIO Y ELEMENTOS ---
      const sndHover = document.getElementById("snd-hover");
      const sndClick = document.getElementById("snd-click");
      const sndStart = document.getElementById("snd-start");
      const bgmMenu = document.getElementById("bgm-menu");

      const btnVolume = document.getElementById("btn-volume");
      const volIcon = document.getElementById("vol-icon");
      const volStatus = document.getElementById("vol-status");

      const selectDifficulty = document.getElementById("select-difficulty");
      const highScoreDisplay = document.getElementById("high-score");
      const btnRanking = document.getElementById("btn-ranking");
      const rankingModal = document.getElementById("ranking-modal");
      const rankingList = document.getElementById("ranking-list");

      // --- LÓGICA DE VOLUMEN ---
      let isMuted = localStorage.getItem("lingo_muted") === "true";

      const applyVolumeSettings = () => {
        if (isMuted) {
          bgmMenu.volume = 0;
          volIcon.innerText = "🔇";
          volStatus.innerText = "OFF";
          volStatus.classList.replace("text-sky-400", "text-slate-500");
        } else {
          bgmMenu.volume = 0.4;
          volIcon.innerText = "🔊";
          volStatus.innerText = "ON";
          volStatus.classList.replace("text-slate-500", "text-sky-400");
        }
      };

      btnVolume.addEventListener("click", () => {
        isMuted = !isMuted;
        localStorage.setItem("lingo_muted", isMuted);
        applyVolumeSettings();
        if (!isMuted && bgmMenu.paused) {
          bgmMenu.play().catch(() => {});
        }
      });

      // --- LÓGICA DE SONIDOS ---
      const playSnd = (audio) => {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      };

      const stopSnd = (audio) => {
        audio.pause();
        audio.currentTime = 0;
      };

      const startMenuMusic = () => {
        applyVolumeSettings();
        if (!isMuted) {
          bgmMenu.play().catch(() => console.log("Esperando interacción..."));
        }
        document.removeEventListener("click", startMenuMusic);
      };
      document.addEventListener("click", startMenuMusic);

      document.querySelectorAll("button, a, select").forEach((el) => {
        el.addEventListener("mouseenter", () => playSnd(sndHover));
        el.addEventListener("mouseleave", () => stopSnd(sndHover));

        el.addEventListener("click", (e) => {
          stopSnd(sndHover);

          if (el.innerText.includes("INICIAR") || el.getAttribute("href") === "game.html") {
            e.preventDefault();
            playSnd(sndStart);

            const fadeInterval = setInterval(() => {
              if (bgmMenu.volume > 0.05) {
                bgmMenu.volume -= 0.05;
              } else {
                bgmMenu.pause();
                clearInterval(fadeInterval);
              }
            }, 50);

            setTimeout(() => {
              window.location.href = el.getAttribute("href") || "game.html";
            }, 1000);
          } else if (el.id !== "btn-volume") {
            playSnd(sndClick);
          }
        });
      });

      // --- LÓGICA DE DATOS (RECORDS Y RANKING) ---
      document.addEventListener("DOMContentLoaded", () => {
        applyVolumeSettings();
        const savedRecord = localStorage.getItem("lingo_high_score") || 0;
        if (highScoreDisplay) highScoreDisplay.innerText = savedRecord;

        const lastDifficulty = localStorage.getItem("selectedDifficulty");
        if (lastDifficulty && selectDifficulty) {
          selectDifficulty.value = lastDifficulty;
        }
      });

      selectDifficulty.addEventListener("change", () => {
        localStorage.setItem("selectedDifficulty", selectDifficulty.value);
      });

      btnRanking.addEventListener("click", () => {
        let history = [];
        try {
          history = JSON.parse(localStorage.getItem("lingo_score_history")) || [];
        } catch (e) {
          history = [];
        }

        rankingList.innerHTML = "";
        if (history.length === 0) {
          rankingList.innerHTML = `<p class="text-center text-slate-500 py-4 italic">No hay puntajes aún.</p>`;
        } else {
          history.slice(0, 5).forEach((score, index) => {
            const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "🎮";
            const div = document.createElement("div");
            div.className =
              "flex items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700 mb-2";
            div.innerHTML = `
          <div class="flex items-center gap-3">
            <span>${medal}</span>
            <span class="font-bold text-slate-400">TOP ${index + 1}</span>
          </div>
          <span class="font-black text-sky-400">${score}</span>
        `;
            rankingList.appendChild(div);
          });
        }
        rankingModal.classList.remove("hidden");
      });

      document.getElementById("close-ranking").onclick = () => {
        rankingModal.classList.add("hidden");
      };
    </script>
  </body>
